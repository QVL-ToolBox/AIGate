<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AIGate — Test Console</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e; --accent: #2f81f7; --ok: #3fb950; --err: #f85149;
    --user: #1f6feb33; --asst: #23863633;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: grid; grid-template-columns: 340px 1fr;
  }
  aside {
    background: var(--panel); border-right: 1px solid var(--border);
    padding: 16px; overflow-y: auto;
  }
  main { display: flex; flex-direction: column; height: 100vh; }
  h1 { font-size: 16px; margin: 0 0 4px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  input, select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 8px; font: inherit;
  }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .checks { display: flex; gap: 16px; margin-top: 12px; }
  .checks label { display: flex; align-items: center; gap: 6px; margin: 0; color: var(--text); }
  .checks input { width: auto; }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 6px;
    padding: 8px 12px; font: inherit; cursor: pointer;
  }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .tools { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .tools button { flex: 1; font-size: 12px; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--user); }
  .msg.assistant { align-self: flex-start; background: var(--asst); }
  .msg.meta { align-self: center; max-width: 95%; font-size: 12px; color: var(--muted);
    background: transparent; border: 1px dashed var(--border); font-family: ui-monospace, monospace; }
  .msg.meta.err { color: var(--err); border-color: var(--err); }
  .composer { display: flex; gap: 8px; padding: 16px; border-top: 1px solid var(--border); }
  .composer textarea { resize: none; height: 44px; }
  .composer button { width: 90px; }
  .status { font-size: 12px; padding: 6px 16px; color: var(--muted); border-top: 1px solid var(--border); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-right: 6px; }
  .dot.ok { background: var(--ok); } .dot.err { background: var(--err); }
</style>
</head>
<body>
<aside>
  <h1><span>AI</span>Gate — Test Console</h1>
  <div class="sub">Browser client for the Rust gateway.</div>

  <label>Gateway base URL</label>
  <input id="baseUrl" value="http://localhost:8080" />

  <label>Engine</label>
  <div class="row">
    <select id="provider">
      <option value="openai">openai</option>
      <option value="gemini">gemini</option>
      <option value="claude">claude</option>
      <option value="mistral">mistral</option>
    </select>
    <input id="model" value="gpt-4o-mini" />
  </div>

  <label>Provider API key (Authorization: Bearer)</label>
  <input id="apiKey" type="password" placeholder="sk-..." />

  <label>Gateway key (X-AIGate-Key) — optional</label>
  <input id="gatewayKey" type="password" placeholder="only if AIGATE_KEYS is set" />

  <label>App name (X-AI-App) — optional</label>
  <input id="appName" placeholder="test-console" />

  <label>System prompt — optional</label>
  <textarea id="system" rows="2" placeholder="You are a helpful assistant."></textarea>

  <div class="checks">
    <label><input type="checkbox" id="stream" checked /> Stream</label>
    <label><input type="checkbox" id="cache" /> Cache</label>
  </div>

  <div class="tools">
    <button class="ghost" onclick="ping()">Health</button>
    <button class="ghost" onclick="listModels()">Models</button>
    <button class="ghost" onclick="getUsage()">Usage</button>
    <button class="ghost" onclick="resetChat()">Clear</button>
  </div>
</aside>

<main>
  <div id="chat"></div>
  <div class="composer">
    <textarea id="input" placeholder="Type a message, Enter to send…"></textarea>
    <button id="send" onclick="send()">Send</button>
  </div>
  <div class="status"><span id="dot" class="dot"></span><span id="statusText">idle</span></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const DEFAULT_MODELS = {
  openai: "gpt-4o-mini", gemini: "gemini-2.0-flash",
  claude: "claude-sonnet-4-5", mistral: "mistral-small-latest",
};
let messages = []; // conversation (excluding system)

$("provider").addEventListener("change", () => {
  $("model").value = DEFAULT_MODELS[$("provider").value] || "";
});
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

function setStatus(text, kind) {
  $("statusText").textContent = text;
  $("dot").className = "dot" + (kind ? " " + kind : "");
}
function bubble(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = text;
  $("chat").appendChild(el);
  $("chat").scrollTop = $("chat").scrollHeight;
  return el;
}
function meta(text, isErr) {
  const el = bubble("meta", text);
  if (isErr) el.classList.add("err");
  return el;
}
function headers(json = true) {
  const h = {};
  if (json) h["Content-Type"] = "application/json";
  const ak = $("apiKey").value.trim();
  if (ak) h["Authorization"] = "Bearer " + ak;
  const gk = $("gatewayKey").value.trim();
  if (gk) h["X-AIGate-Key"] = gk;
  const app = $("appName").value.trim();
  if (app) h["X-AI-App"] = app;
  if ($("cache").checked) h["X-AI-Cache"] = "on";
  return h;
}
function base() { return $("baseUrl").value.replace(/\/+$/, ""); }

async function ping() {
  setStatus("GET /health…");
  try {
    const r = await fetch(base() + "/health");
    meta("/health → " + r.status + " " + (await r.text()));
    setStatus("ok", "ok");
  } catch (e) { meta("health failed: " + e, true); setStatus("error", "err"); }
}
async function listModels() {
  setStatus("GET /v1/models…");
  try {
    const r = await fetch(base() + "/v1/models?provider=" + $("provider").value, { headers: headers(false) });
    const j = await r.json();
    if (!r.ok) throw new Error(JSON.stringify(j));
    meta("models (" + $("provider").value + "): " + j.data.map(m => m.id).join(", "));
    setStatus("ok", "ok");
  } catch (e) { meta("models failed: " + e, true); setStatus("error", "err"); }
}
async function getUsage() {
  setStatus("GET /v1/usage…");
  try {
    const r = await fetch(base() + "/v1/usage", { headers: headers(false) });
    const j = await r.json();
    if (!r.ok) throw new Error(JSON.stringify(j));
    meta("usage: " + JSON.stringify(j, null, 2));
    setStatus("ok", "ok");
  } catch (e) { meta("usage failed: " + e, true); setStatus("error", "err"); }
}
function resetChat() { messages = []; $("chat").innerHTML = ""; setStatus("cleared"); }

function buildBody() {
  const msgs = [];
  const sys = $("system").value.trim();
  if (sys) msgs.push({ role: "system", content: sys });
  for (const m of messages) msgs.push(m);
  return {
    model: $("provider").value + "/" + $("model").value.trim(),
    messages: msgs,
    stream: $("stream").checked,
  };
}

async function send() {
  const text = $("input").value.trim();
  if (!text) return;
  $("input").value = "";
  messages.push({ role: "user", content: text });
  bubble("user", text);
  $("send").disabled = true;

  const body = buildBody();
  const url = base() + "/v1/chat/completions";
  try {
    if (body.stream) await sendStream(url, body);
    else await sendOnce(url, body);
    setStatus("ok", "ok");
  } catch (e) {
    meta("request failed: " + e, true);
    setStatus("error", "err");
  } finally {
    $("send").disabled = false;
  }
}

async function sendOnce(url, body) {
  setStatus("POST (non-stream)…");
  const r = await fetch(url, { method: "POST", headers: headers(), body: JSON.stringify(body) });
  const j = await r.json();
  if (!r.ok) throw new Error(JSON.stringify(j));
  const choice = j.choices?.[0]?.message || {};
  const content = choice.content || "";
  bubble("assistant", content || "(no text)");
  if (choice.tool_calls) meta("tool_calls: " + JSON.stringify(choice.tool_calls));
  const cacheHdr = r.headers.get("x-ai-cache");
  const u = j.usage;
  meta([`cache: ${cacheHdr || "?"}`, j.model, u ? `tokens: ${u.total_tokens}` : ""].filter(Boolean).join("  ·  "));
  messages.push({ role: "assistant", content });
}

async function sendStream(url, body) {
  setStatus("POST (stream)…");
  const el = bubble("assistant", "");
  const r = await fetch(url, { method: "POST", headers: headers(), body: JSON.stringify(body) });
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  const reader = r.body.getReader();
  const decoder = new TextDecoder();
  let buf = "", acc = "", toolDump = "";
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const parts = buf.split("\n\n");
    buf = parts.pop();
    for (const part of parts) {
      const line = part.split("\n").find(l => l.startsWith("data:"));
      if (!line) continue;
      const data = line.slice(5).trim();
      if (data === "[DONE]") continue;
      let j; try { j = JSON.parse(data); } catch { continue; }
      const delta = j.choices?.[0]?.delta || {};
      if (delta.content) { acc += delta.content; el.textContent = acc; }
      if (delta.tool_calls) toolDump += JSON.stringify(delta.tool_calls);
      $("chat").scrollTop = $("chat").scrollHeight;
    }
  }
  if (!acc && !toolDump) el.textContent = "(no text)";
  if (toolDump) meta("streamed tool_calls: " + toolDump);
  messages.push({ role: "assistant", content: acc });
}
</script>
</body>
</html>
